services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification_app
    volumes:
      - ./src:/var/www
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=notifications
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    networks:
      - notification-net
    depends_on:
      - postgres
      - redis

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification_worker
    volumes:
      - ./src:/var/www
    command: php artisan queue:work redis --queue=high,low --sleep=3 --tries=3 --backoff=5
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=notifications
      - DB_USERNAME=user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    networks:
      - notification-net
    depends_on:
      - app
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: notification_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - notification-net
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    container_name: notification_postgres
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - notification-net

  redis:
    image: redis:7-alpine
    container_name: notification_redis
    ports:
      - "6379:6379"
    networks:
      - notification-net

networks:
  notification-net:
    driver: bridge

volumes:
  pgdata: